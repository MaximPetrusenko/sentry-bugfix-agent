name: Fix Branch Tests

on:
  push:
    branches:
      - 'fix/**'

jobs:
  test:
    name: Run tests on agent-generated fix branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Comment test result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
              state: 'open',
            });
            if (prs.length === 0) return;
            const pr = prs[0];
            const success = '${{ job.status }}' === 'success';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: success
                ? '✅ CI passed on this agent-generated fix branch. Ready for human review.'
                : '❌ CI failed on this agent-generated fix branch. Review required before merging.',
            });
